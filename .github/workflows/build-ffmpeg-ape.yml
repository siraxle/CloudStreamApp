name: Build libffmpegJNI with APE decoder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
            cpu: armv8-a
            cross_prefix: aarch64-linux-android21-
            extra_flags: ""
          - abi: x86_64
            arch: x86_64
            cpu: x86_64
            cross_prefix: x86_64-linux-android21-
            extra_flags: "--disable-asm"

    steps:
      - name: Install build tools
        run: sudo apt-get install -y nasm

      - name: Download ExoPlayer r2.19.1 FFmpeg JNI sources
        run: |
          wget -q https://github.com/google/ExoPlayer/archive/refs/tags/r2.19.1.tar.gz -O exo.tar.gz
          tar xf exo.tar.gz ExoPlayer-r2.19.1/extensions/ffmpeg/src/main/jni
          mv ExoPlayer-r2.19.1/extensions/ffmpeg/src/main/jni ./jni

      - name: Clone FFmpeg 4.2
        run: |
          git clone --depth=1 --branch release/4.2 https://github.com/FFmpeg/FFmpeg ./jni/ffmpeg

      - name: Build FFmpeg static libs (${{ matrix.abi }})
        run: |
          NDK="$ANDROID_NDK_LATEST_HOME"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"

          DECODERS="vorbis opus flac alac pcm_mulaw pcm_alaw mp3 amrnb amrwb aac ac3 eac3 dca mlp truehd ape"
          DECODER_FLAGS=""
          for d in $DECODERS; do DECODER_FLAGS="$DECODER_FLAGS --enable-decoder=$d"; done

          cd jni/ffmpeg
          ./configure \
            --target-os=android \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-programs \
            --disable-everything \
            --disable-avdevice \
            --disable-avformat \
            --disable-swscale \
            --disable-postproc \
            --disable-avfilter \
            --disable-symver \
            --disable-avresample \
            --enable-swresample \
            --extra-ldexeflags=-pie \
            --libdir=android-libs/${{ matrix.abi }} \
            --arch=${{ matrix.arch }} \
            --cpu=${{ matrix.cpu }} \
            --cross-prefix="$TOOLCHAIN/${{ matrix.cross_prefix }}" \
            --nm="$TOOLCHAIN/llvm-nm" \
            --ar="$TOOLCHAIN/llvm-ar" \
            --ranlib="$TOOLCHAIN/llvm-ranlib" \
            --strip="$TOOLCHAIN/llvm-strip" \
            ${{ matrix.extra_flags }} \
            $DECODER_FLAGS

          make -j$(nproc)
          make install-libs

      - name: Build libffmpegJNI.so (${{ matrix.abi }})
        run: |
          NDK="$ANDROID_NDK_LATEST_HOME"
          cmake -B build-${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            ./jni
          cmake --build build-${{ matrix.abi }} --target ffmpegJNI -j$(nproc)

      - name: Verify APE decoder is present
        run: |
          nm -D build-${{ matrix.abi }}/libffmpegJNI.so | grep -i "ape\|monkey" \
            || echo "WARNING: no APE symbols found — check FFmpeg config"

      - name: Upload libffmpegJNI.so (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: libffmpegJNI-${{ matrix.abi }}-ape
          path: build-${{ matrix.abi }}/libffmpegJNI.so
          if-no-files-found: error
