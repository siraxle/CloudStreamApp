# Builds libffmpegJNI.so with APE (Monkey's Audio) support for use with
# org.jellyfin.media3:media3-ffmpeg-decoder:1.6.1+1.
#
# Key differences vs the original Media3 1.1.1 JNI source:
#   • ffmpegDecode() now takes an extra SimpleDecoderOutputBuffer parameter
#     (inserted before outputData) that Jellyfin added for dynamic buffer resizing.
#     We add the parameter but ignore it — the Java-side bytecode patch
#     (FfmpegLibraryPatch.kt) pre-sizes the output buffer to 4 MiB for APE so
#     resizing is never triggered.
#   • APE decoder enabled in FFmpeg configure flags.
#   • createContext() sets sample_rate/channels before avcodec_open2 (required for APE).
#
# After the workflow completes, download the artifacts and place them at:
#   app/src/main/jniLibs/arm64-v8a/libffmpegJNI.so
#   app/src/main/jniLibs/x86_64/libffmpegJNI.so
name: Build libffmpegJNI with APE decoder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
            cpu: armv8-a
            cross_prefix: aarch64-linux-android21-
            extra_flags: ""
          - abi: x86_64
            arch: x86_64
            cpu: x86_64
            cross_prefix: x86_64-linux-android21-
            extra_flags: "--disable-asm"

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install -y nasm

      # Use the project's patched JNI source (tracked in ffmpeg-jni/):
      #   • sample_rate/channels set in createContext() for APE
      #   • ffmpegDecode() updated to accept the Jellyfin extra outputBufferObj param
      - name: Copy patched JNI source
        run: |
          cp -r ffmpeg-jni ./jni

      - name: Clone FFmpeg 4.2
        run: |
          git clone --depth=1 --branch release/4.2 https://github.com/FFmpeg/FFmpeg ./jni/ffmpeg

      - name: Build FFmpeg static libs (${{ matrix.abi }})
        run: |
          NDK="$ANDROID_NDK_LATEST_HOME"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"

          DECODERS="vorbis opus flac alac pcm_mulaw pcm_alaw mp3 amrnb amrwb aac ac3 eac3 dca mlp truehd ape"
          DECODER_FLAGS=""
          for d in $DECODERS; do DECODER_FLAGS="$DECODER_FLAGS --enable-decoder=$d"; done

          cd jni/ffmpeg
          ./configure \
            --target-os=android \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-programs \
            --disable-everything \
            --disable-avdevice \
            --disable-avformat \
            --disable-swscale \
            --disable-postproc \
            --disable-avfilter \
            --disable-symver \
            --disable-avresample \
            --enable-swresample \
            --extra-ldexeflags=-pie \
            --libdir=android-libs/${{ matrix.abi }} \
            --arch=${{ matrix.arch }} \
            --cpu=${{ matrix.cpu }} \
            --cross-prefix="$TOOLCHAIN/${{ matrix.cross_prefix }}" \
            --nm="$TOOLCHAIN/llvm-nm" \
            --ar="$TOOLCHAIN/llvm-ar" \
            --ranlib="$TOOLCHAIN/llvm-ranlib" \
            --strip="$TOOLCHAIN/llvm-strip" \
            ${{ matrix.extra_flags }} \
            $DECODER_FLAGS

          make -j$(nproc)
          make install-libs

      - name: Build libffmpegJNI.so (${{ matrix.abi }})
        run: |
          NDK="$ANDROID_NDK_LATEST_HOME"
          cmake -B build-${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            ./jni
          cmake --build build-${{ matrix.abi }} --target ffmpegJNI -j$(nproc)

      - name: Verify APE decoder symbols
        run: |
          nm -D build-${{ matrix.abi }}/libffmpegJNI.so | grep -i "ape\|ffmpegHasDecoder" \
            || echo "WARNING: check FFmpeg config"

      - name: Upload libffmpegJNI.so (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: libffmpegJNI-${{ matrix.abi }}-ape
          path: build-${{ matrix.abi }}/libffmpegJNI.so
          if-no-files-found: error
